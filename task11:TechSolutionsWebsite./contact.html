<!DOCTYPE html>
<html lang="en">
  <head>
    <title>TechSolutions - Contact</title>
  </head>
  <body>

    <header>
      <h1>TechSolutions Company</h1>
    </header>

    <nav>
      <a href="index.html">Home</a> |
      <a href="about.html">About</a> |
      <a href="services.html">Services</a> |
      <a href="gallery.html">Gallery</a> |
      <a href="contact.html">Contact</a>
    </nav>

    <main>
      <section>
        <h2>Contact Us</h2>
        <p>We would love to hear from you. Fill in the form below and our team will get back to you within 24 hours.</p>

        <form>

          <label for="fullname">Full Name:</label><br>
          <input type="text" id="fullname" name="fullname" placeholder="Enter your full name"><br><br>

          <label for="email">Email Address:</label><br>
          <input type="email" id="email" name="email" placeholder="Enter your email address"><br><br>

          <label for="phone">Phone Number:</label><br>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number"><br><br>

          <label for="service">Select a Service:</label><br>
          <select id="service" name="service">
            <option value="">-- Choose a Service --</option>
            <option value="web">Web Development</option>
            <option value="mobile">Mobile App Development</option>
            <option value="marketing">Digital Marketing</option>
            <option value="cloud">Cloud Computing Solutions</option>
            <option value="consulting">IT Consulting</option>
            <option value="security">Cybersecurity Services</option>
          </select><br><br>

          <label for="message">Message:</label><br>
          <textarea id="message" name="message" rows="6" placeholder="Write your message here"></textarea><br><br>

          <button type="submit">Send Message</button>

        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2025 TechSolutions Company. All rights reserved.</p>
      <p>Email: info@techsolutions.com</p>
    </footer>

  </body>
</html>
